<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin PRO MAX</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#090b1a;--card:rgba(17,22,48,.82);--line:rgba(124,92,255,.18);--text:#eef2ff;--muted:#98a2c7;--accent:#735cff;--accent2:#58b6ff;--green:#16c47f;--red:#ef5350;--shadow:0 18px 50px rgba(0,0,0,.35)}*{box-sizing:border-box}body{margin:0;font-family:Inter,Prompt,sans-serif;color:var(--text);background:radial-gradient(circle at 10% 10%, rgba(115,92,255,.18), transparent 30%),radial-gradient(circle at 90% 10%, rgba(88,182,255,.14), transparent 28%),linear-gradient(180deg,#0a0d1d,#090b1a 40%,#070913);min-height:100vh}.shell{max-width:1400px;margin:0 auto;padding:22px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px}.brand{display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px solid var(--line);background:var(--card);border-radius:20px;box-shadow:var(--shadow)}.logo{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent2))}.brand h1{font-size:18px;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer;color:#fff;text-decoration:none}.btn-primary{background:linear-gradient(135deg,#755eff,#5344df)}.btn-dark{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}.btn-green{background:linear-gradient(135deg,#16c47f,#0f9c66)}.btn-red{background:linear-gradient(135deg,#ef5350,#cc3c39)}.pill{padding:10px 14px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-size:12px;color:var(--muted)}.panel{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow)}.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.section-title{font-size:24px;font-weight:800;margin:0 0 6px}.muted{color:var(--muted)}.user-list{display:grid;gap:12px;margin-top:16px}.user-card{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);padding:14px;border-radius:18px}.meta{font-size:12px;color:var(--muted);line-height:1.6}.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);padding:12px;border-radius:16px}.stat .k{font-size:11px;color:var(--muted)}.stat .v{font-size:22px;font-weight:800;margin-top:4px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;transition:.25s;background:#151b37;border:1px solid rgba(255,255,255,.08);color:#fff;padding:12px 16px;border-radius:14px;z-index:50}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:1100px){.grid{grid-template-columns:1fr}}</style></head>
<body><div class="shell"><div class="topbar"><div class="brand"><div class="logo">🛡️</div><div><h1>Admin PRO MAX</h1><p>Google Login • Approvals • User Stats • Spark Plan</p></div></div><div class="row"><div class="pill" id="authPill">ยังไม่ได้เข้าสู่ระบบ</div><a class="btn btn-dark" href="./index.html">กลับหน้า Prompt</a><button class="btn btn-primary" id="loginBtn">Sign in with Google</button><button class="btn btn-dark" id="logoutBtn" style="display:none">ออกจากระบบ</button></div></div><div class="grid"><section class="panel"><h2 class="section-title">จัดการผู้ใช้</h2><div class="muted">ล็อกอินด้วยอีเมลแอดมินเพื่ออนุมัติหรือยกเลิกผู้ใช้</div><div class="row" style="margin-top:12px"><button class="btn btn-dark" id="refreshBtn">รีเฟรชรายชื่อ</button></div><div class="user-list" id="userList"></div></section><aside class="panel"><h2 class="section-title">ภาพรวม</h2><div class="stat-grid"><div class="stat"><div class="k">Users</div><div class="v" id="statUsers">0</div></div><div class="stat"><div class="k">Approved</div><div class="v" id="statApproved">0</div></div><div class="stat"><div class="k">Pending</div><div class="v" id="statPending">0</div></div></div><div style="margin-top:18px" class="muted" id="adminInfo">เฉพาะแอดมินเท่านั้นที่ดูหน้านี้ได้</div></aside></div></div><div class="toast" id="toast"></div><script type="module" src="./admin.js"></script></body></html>
