<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Final Prompt Pro • Firebase Edition</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#090b1a;
      --card:rgba(17,22,48,.82);
      --line:rgba(124,92,255,.18);
      --text:#eef2ff;
      --muted:#98a2c7;
      --accent:#735cff;
      --accent2:#58b6ff;
      --green:#16c47f;
      --red:#ef5350;
      --yellow:#ffcf4d;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,Prompt,sans-serif;
      color:var(--text);
      background:
      radial-gradient(circle at 10% 10%, rgba(115,92,255,.18), transparent 30%),
      radial-gradient(circle at 90% 10%, rgba(88,182,255,.14), transparent 28%),
      linear-gradient(180deg,#0a0d1d,#090b1a 40%,#070913);
      min-height:100vh;
    }

    .shell{max-width:1440px;margin:auto;padding:22px}

    .topbar{
      display:flex;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      gap:14px;
      align-items:center;
      padding:14px 18px;
      border:1px solid var(--line);
      background:var(--card);
      border-radius:20px;
      box-shadow:var(--shadow);
    }

    .logo{
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      font-size:22px;
    }

    .brand h1{margin:0;font-size:18px}
    .brand p{margin:4px 0 0;font-size:12px;color:var(--muted)}

    .pill{
      padding:10px 14px;
      border-radius:999px;
      background:var(--card);
      border:1px solid var(--line);
      font-size:12px;
      color:var(--muted);
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-weight:700;
      cursor:pointer;
      color:#fff;
    }

    .btn-primary{
      background:linear-gradient(135deg,#755eff,#5344df);
    }

    .btn-dark{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }

    .btn-green{
      background:linear-gradient(135deg,#16c47f,#0f9c66);
    }

    .btn-red{
      background:linear-gradient(135deg,#ef5350,#cc3c39);
    }

    .layout{
      display:grid;
      grid-template-columns:380px 1fr;
      gap:18px;
    }

    .panel,.maincard{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .panel{
      padding:18px;
    }

    .maincard{
      padding:18px;
    }

    input,textarea,select{
      width:100%;
      background:rgba(255,255,255,.05);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:13px 14px;
      font:inherit;
      margin-bottom:12px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .row>*{flex:1}

    .prompt-box{
      min-height:340px;
      white-space:pre-wrap;
    }

    .results{
      display:none;
      gap:16px;
      grid-template-columns:1fr 1fr;
    }

    .prompt-card{
      background:rgba(14,18,40,.95);
      border:1px solid rgba(255,255,255,.06);
      border-radius:20px;
      padding:16px;
    }

    .history-grid{
      display:grid;
      gap:12px;
    }

    .history-item{
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(3,6,18,.72);
      display:none;
      place-items:center;
      z-index:50;
    }

    .overlay.show{
      display:grid;
    }

    .loader{
      padding:24px;
      border-radius:20px;
      background:#151b37;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:#151b37;
      padding:12px 16px;
      border-radius:14px;
      display:none;
      z-index:60;
    }

    .toast.show{
      display:block;
    }

    @media(max-width:1100px){
      .layout{grid-template-columns:1fr}
      .results{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

<div class="shell">

  <div class="topbar">
    <div class="brand">
      <div class="logo">✨</div>
      <div>
        <h1>Gemini Final Prompt Pro</h1>
        <p>Firebase Edition • Google Login • Admin Approval</p>
      </div>
    </div>

    <div class="row" style="max-width:460px">
      <div class="pill" id="authPill">ยังไม่ได้เข้าสู่ระบบ</div>
      <button class="btn btn-primary" id="loginBtn">Sign in with Google</button>
      <button class="btn btn-dark" id="logoutBtn" style="display:none">ออกจากระบบ</button>
    </div>
  </div>

  <div class="layout">

    <aside class="panel">

      <h3>Gemini API Key</h3>

      <input id="userApiKey" type="password" placeholder="วาง Gemini API Key">
      <div class="row">
        <button class="btn btn-green" id="connectKeyBtn">เชื่อมต่อ</button>
        <button class="btn btn-dark" id="testKeyBtn">ทดสอบ</button>
        <button class="btn btn-red" id="deleteKeyBtn">ลบ</button>
      </div>

      <hr>

      <h3>Prompt Builder</h3>

      <input id="product" placeholder="1. สินค้า">

      <input id="location" placeholder="2. สถานที่">

      <textarea id="view" placeholder="3. มุมมองสินค้า"></textarea>

      <div class="row">
        <select id="sceneCount">
          <option value="1">1 Scene</option>
          <option value="2">2 Scene</option>
          <option value="3">3 Scene</option>
        </select>

        <select id="duration">
          <option value="8">8s</option>
          <option value="10" selected>10s</option>
          <option value="12">12s</option>
          <option value="15">15s</option>
        </select>
      </div>

      <div class="row">
        <button class="btn btn-dark" id="clearBtn">ล้างข้อมูล</button>
        <button class="btn btn-primary" id="generateBtn">🚀 สร้าง Prompt</button>
      </div>

    </aside>

    <main class="maincard">

      <div class="pill" id="statusPill">Ready</div>

      <div class="results" id="resultsWrap">

        <section class="prompt-card">
          <h3>IMAGE PROMPT</h3>

          <textarea id="imagePrompt" class="prompt-box" readonly></textarea>

          <div class="row">
            <button class="btn btn-dark" id="editImageBtn">แก้ไข</button>
            <button class="btn btn-green" id="saveImageBtn">บันทึก</button>
            <button class="btn btn-dark" id="copyImageBtn">คัดลอก</button>
          </div>
        </section>

        <section class="prompt-card">
          <h3>VDO PROMPT</h3>

          <textarea id="videoPrompt" class="prompt-box" readonly></textarea>

          <div class="row">
            <button class="btn btn-dark" id="editVideoBtn">แก้ไข</button>
            <button class="btn btn-green" id="saveVideoBtn">บันทึก</button>
            <button class="btn btn-dark" id="copyVideoBtn">คัดลอก</button>
          </div>
        </section>

      </div>

      <hr>

      <h3>Prompt History</h3>
      <div class="history-grid" id="historyList"></div>

      <div id="adminPanel" style="display:none">
        <hr>
        <h3>Admin Panel</h3>
        <div id="adminUsers"></div>
      </div>

    </main>

  </div>
</div>

<div class="overlay" id="loadingOverlay">
  <div class="loader">
    กำลังประมวลผล...
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="./app.js"></script>

</body>
</html>
